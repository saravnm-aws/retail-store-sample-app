name: Deploy to EKS
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/retail-store-app -n default
      
      - name: Verify deployment
        run: |
          kubectl get pods -n default
          kubectl get services -n default

