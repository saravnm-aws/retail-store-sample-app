name: Deploy to EKS
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Helmfile
        run: |
          curl -fsSL -o helmfile https://github.com/helmfile/helmfile/releases/latest/download/helmfile_linux_amd64
          chmod +x helmfile
          sudo mv helmfile /usr/local/bin/

      - name: Generate and deploy manifests
        run: |
          export IMAGE_TAG=1.4.0
          export LOAD_BALANCER=yes
          helmfile template -f src/app/helmfile.yaml --skip-tests | kubectl apply -f -

      - name: Wait for deployments
        run: |
          kubectl wait --for=condition=available deployments --all -n default --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n default
          kubectl get services -n default
